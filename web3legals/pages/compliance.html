function renderCompliance(data) {
  const container = document.getElementById('complianceAccordion');
  container.innerHTML = data.map((c, i) => `
    <div class="acc-item fade-in" id="acc${i}">
      <div class="acc-header" onclick="toggleAcc(${i})">
        <div style="font-size:2rem;">${c.flag}</div>
        <div>
          <h3 style="font-size:1.05rem;margin-bottom:0.2rem;">${c.name}</h3>
          <p style="font-size:0.8rem;margin:0;">${c.summary}</p>
        </div>
        <div style="margin-left:auto;text-align:right;flex-shrink:0;margin-right:1rem;">
          <span style="font-size:1.4rem;font-family:var(--font-display);font-weight:700;color:var(--gold);">${c.score}</span>
          <span style="font-size:0.7rem;color:var(--white-muted);display:block;">/ 100</span>
        </div>
        <div class="acc-arrow">▼</div>
      </div>
      <div class="acc-body">
        <div class="compliance-grid">
          <div class="compliance-col">
            <h5>🏛️ Licensing Requirements</h5>
            <ul>${c.licensing.map(l => `<li><span class="status-tag st-required">REQ</span>${l}</li>`).join('')}</ul>
          </div>
          <div class="compliance-col">
            <h5>🔍 AML/KYC Obligations</h5>
            <ul>${c.aml.map(a => `<li><span class="status-tag st-required">REQ</span>${a}</li>`).join('')}</ul>
          </div>
          <div class="compliance-col">
            <h5>📋 Other Regulatory Duties</h5>
            <ul>${c.other.map(o => `<li><span class="status-tag st-optional">NOTE</span>${o}</li>`).join('')}</ul>
          </div>
        </div>
        <div style="padding:0 2rem 1.5rem;display:flex;gap:1rem;flex-wrap:wrap;">
          <a href="contact.html" class="btn btn-gold" style="font-size:0.85rem;padding:0.6rem 1.25rem;">Get ${c.name.split('—')[0].trim()} Legal Advice →</a>
          <a href="crypto-countries.html" class="btn btn-ghost" style="font-size:0.85rem;padding:0.6rem 1.25rem;">Compare Countries</a>
        </div>
      </div>
    </div>`).join('');

  document.querySelectorAll('.fade-in').forEach(el => {
    const obs = new IntersectionObserver(e => { if(e[0].isIntersecting){el.classList.add('visible');obs.unobserve(el);} },{threshold:0.05});
    obs.observe(el);
  });
}

function toggleAcc(i) {
  const item = document.getElementById('acc' + i);
  item.classList.toggle('open');
}

function filterCompliance() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (!q) { renderCompliance(COMPLIANCE); return; }
  const filtered = COMPLIANCE.filter(c =>
    c.name.toLowerCase().includes(q) ||
    c.summary.toLowerCase().includes(q) ||
    c.licensing.some(l => l.toLowerCase().includes(q)) ||
    c.aml.some(a => a.toLowerCase().includes(q)) ||
    c.other.some(o => o.toLowerCase().includes(q))
  );
  renderCompliance(filtered);
}

document.addEventListener('DOMContentLoaded', () => renderCompliance(COMPLIANCE));
</script>
